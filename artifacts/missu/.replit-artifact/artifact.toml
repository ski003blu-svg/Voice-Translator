kind = "web"
previewPath = "/"
title = "MissU Live Voice Translation"
version = "1.0.0"
id = "artifacts/missu"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18458

[services.development]
run = "pnpm --filter @workspace/missu run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/missu", "run", "build" ]
publicDir = "artifacts/missu/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18458"
BASE_PATH = "/"
